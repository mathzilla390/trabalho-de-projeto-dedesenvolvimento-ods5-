<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
        }

        h1 {
            color: #00ffcc;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Login realizado com sucesso!!!</h1>
    </div>
</body>
</html>
